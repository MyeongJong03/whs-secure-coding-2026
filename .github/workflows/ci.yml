name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository with preserved phase tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify preserved Phase 01 through Phase 05 tags
        run: |
          git show-ref --verify --quiet refs/tags/phase-01-foundation
          git show-ref --verify --quiet refs/tags/phase-02-auth-users
          git show-ref --verify --quiet refs/tags/phase-03-products-search
          git show-ref --verify --quiet refs/tags/phase-04-chat
          git show-ref --verify --quiet refs/tags/phase-05-moderation-admin

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate ephemeral application configuration
        run: |
          python -c "import secrets; print('SECRET_KEY=' + secrets.token_urlsafe(48))" >> "$GITHUB_ENV"
          echo "FLASK_CONFIG=development" >> "$GITHUB_ENV"
          echo "DATABASE_URL=sqlite:///${RUNNER_TEMP}/ci.sqlite" >> "$GITHUB_ENV"

      - name: Run tests
        run: python -m pytest

      - name: Enforce application coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=90

      - name: Run Ruff checks
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run Bandit
        run: python -m bandit -q -r app scripts run.py

      - name: Audit runtime dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
        run: pip-audit -r requirements.txt

      - name: Audit development dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
        run: pip-audit -r requirements-dev.txt

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q app scripts tests run.py

      - name: Verify migrations on empty SQLite database
        run: |
          python -m flask --app run.py db upgrade
          python -m flask --app run.py db check
